<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matrix DNA Rain</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      overflow: hidden;
      background-color: #010410;
    }

    canvas#codeRain {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .card {
      background: rgba(0, 15, 25, 0.35);
      -webkit-backdrop-filter: blur(15px);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.1), 0 0 40px rgba(0, 255, 204, 0.05);
      border: 1px solid rgba(0, 255, 204, 0.25);
      text-align: center;
      max-width: 500px;
      width: 90%;
      margin: auto;
      position: relative;
      top: 50%;
      transform: translateY(-50%);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

.card:hover {
  transform: translateY(-52%) scale(1.01);
  box-shadow: 0 0 30px rgba(0, 255, 204, 0.2), 0 0 60px rgba(0, 255, 204, 0.1);
}


    h1 {
      margin-bottom: 20px;
      color: #ffffff;
      font-family: 'Roboto', sans-serif;
      font-weight: 700;
    }

    input[type="file"], button {
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
      background-color: #041528;
      color: white;
      font-family: 'Orbitron', sans-serif;
    }

    input[type="file"]:hover,
    button:hover {
      background-color: #06182a;
      transition: background 0.3s ease;
    }

    label {
      color: #ffffff;
      font-weight: bold;
      display: block;
      margin-bottom: 10px;
    }

    #resultSection {
      display: none;
      margin-top: 20px;
    }

    #prediction {
      font-size: 1.2rem;
      font-weight: bold;
      color: #ffffff;
      margin-top: 15px;
    }

    .image-wrapper {
      position: relative;
      display: inline-block;
      margin-top: 10px;
    }

    #preview {
      max-width: 100%;
      border-radius: 10px;
      display: none;
      box-shadow: 0 0 10px rgba(177, 243, 243, 0.2);
    }

    .scan-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 10px;
      overflow: hidden;
      pointer-events: none;
      display: none;
    }

    .scan-line {
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, transparent 0%, #00ffcc44 50%, transparent 100%);
      animation: scan 2.5s linear infinite;
    }

    @keyframes scan {
      0% { top: -100%; }
      100% { top: 100%; }
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 123, 255, 0.3);
      border-top: 2px solid #007bff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <canvas id="codeRain"></canvas>
  <div class="card">
    <h1>Upload Image for Analysis</h1>
    <form id="uploadForm" enctype="multipart/form-data">
      <label for="fileInput">Select an image <strong>(<em>.png,.jpg,.jpeg</em>)</strong> file:</label><br />
      <input id="fileInput" type="file" name="file" accept="image/*" required /><br />
      <button type="submit">Analyze Image</button>
    </form>

    <div id="resultSection">
      <p id="prediction"></p>
      <div class="image-wrapper">
        <img id="preview" src="#" alt="Uploaded Image" />
        <div class="scan-overlay" id="scanner">
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("codeRain");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = "AIHSYC10561".split("");
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array.from({ length: columns }).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(1, 4, 16, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#00ffcc";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(draw, 33);

    const form = document.getElementById("uploadForm");
    const resultSection = document.getElementById("resultSection");
    const predictionText = document.getElementById("prediction");
    const previewImg = document.getElementById("preview");
    const fileInput = document.getElementById("fileInput");
    const scanner = document.getElementById("scanner");

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          previewImg.src = e.target.result;
          previewImg.style.display = "block";
          resultSection.style.display = "block";
        };
        reader.readAsDataURL(file);
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(form);

      predictionText.innerHTML = `Analyzing <span class="spinner"></span>`;
      resultSection.style.display = "block";
      scanner.style.display = "block";

      try {
        const response = await fetch("/analyze", {
          method: "POST",
          body: formData,
        });

        const result = await response.json();

        if (result.prediction && result.file) {
          predictionText.textContent = result.prediction;
          previewImg.src = `/uploads/${result.file}`;
          previewImg.style.display = "block";
        } else {
          predictionText.textContent = "Prediction failed. Please try again.";
          previewImg.src = "#";
          previewImg.style.display = "none";
        }
      } catch (err) {
        predictionText.textContent = "Error occurred. Try again later.";
        previewImg.src = "#";
        previewImg.style.display = "none";
        console.error(err);
      } finally {
        scanner.style.display = "none";
      }
    });
  </script>
</body>
</html>
